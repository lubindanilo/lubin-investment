services:
  postgres:
    image: postgres:17-alpine
    container_name: lubin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lubin
      POSTGRES_PASSWORD: lubin
      POSTGRES_DB: lubin_investment
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lubin -d lubin_investment"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
